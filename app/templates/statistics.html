{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4 pb-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">📊 支出分類統計</h3>
                <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">回首頁</a>
            </div>
            
            {% if data and data|length > 0 %}
            <div class="row">
                <div class="col-md-9 mx-auto" style="height: 400px; position: relative;">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const ctx = document.getElementById('expenseChart').getContext('2d');
                    const config = {
                        type: 'doughnut',
                        data: {
                            labels: {{ labels|tojson }},
                            datasets: [{
                                data: {{ data|tojson }},
                                backgroundColor: [
                                    '#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff', '#ff9f40', '#c9cbcf',
                                    '#ff7f50', '#87cefa', '#da70d6', '#32cd32', '#6495ed'
                                ],
                                borderWidth: 2,
                                hoverOffset: 10
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        padding: 20,
                                        font: {
                                            family: "'Inter', 'Segoe UI', sans-serif",
                                            size: 14
                                        }
                                    }
                                }
                            }
                        }
                    };
                    new Chart(ctx, config);
                });
            </script>
            {% else %}
            <div class="text-center py-5 text-muted">
                <p class="fs-5">目前還沒有任何支出紀錄，無法產生圖表喔！</p>
                <a href="{{ url_for('expense.expense') }}" class="btn btn-danger mt-3 action-btn">去記一筆支出</a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
